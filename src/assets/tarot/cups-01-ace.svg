<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="300" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1E1B4B" />
      <stop offset="50%" stop-color="#1B2B4B" />
      <stop offset="100%" stop-color="#1B3B5B" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.15" />
      <stop offset="100%" stop-color="transparent" stop-opacity="0" />
    </radialGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <pattern id="stars" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.5" fill="#FFD580" opacity="0.3" />
      <circle cx="5" cy="8" r="0.3" fill="#C4B5FD" opacity="0.2" />
      <circle cx="35" cy="32" r="0.4" fill="#FFD580" opacity="0.2" />
      <circle cx="12" cy="35" r="0.3" fill="#FCA5A5" opacity="0.15" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="300" height="450" rx="12" fill="url(#bg)" />
  <rect width="300" height="450" rx="12" fill="url(#stars)" />
  <rect width="300" height="450" rx="12" fill="url(#glow)" />

  <!-- Ornate Border -->
  <rect x="8" y="8" width="284" height="434" rx="8" fill="none" stroke="#FFD580" stroke-width="1.5" opacity="0.6" />
  <rect x="14" y="14" width="272" height="422" rx="6" fill="none" stroke="#FFD580" stroke-width="0.5" opacity="0.3" />

  <!-- Corner Ornaments -->
  <g opacity="0.5" fill="#FFD580">
    <!-- Top-left -->
    <path d="M20,25 Q25,20 30,25 Q25,30 20,25 Z" />
    <circle cx="25" cy="25" r="2" />
    <!-- Top-right -->
    <path d="M270,25 Q275,20 280,25 Q275,30 270,25 Z" />
    <circle cx="275" cy="25" r="2" />
    <!-- Bottom-left -->
    <path d="M20,425 Q25,420 30,425 Q25,430 20,425 Z" />
    <circle cx="25" cy="425" r="2" />
    <!-- Bottom-right -->
    <path d="M270,425 Q275,420 280,425 Q275,430 270,425 Z" />
    <circle cx="275" cy="425" r="2" />
  </g>

  <!-- Celestial decorative arcs -->
  <path d="M50,60 Q150,30 250,60" fill="none" stroke="#FFD580" stroke-width="0.5" opacity="0.3" />
  <path d="M50,390 Q150,420 250,390" fill="none" stroke="#FFD580" stroke-width="0.5" opacity="0.3" />

  <!-- Suit Symbol / Art -->
  <g transform="translate(150,220) scale(2.5)" fill="none" stroke="#FFD580" stroke-width="1.5">
    <path d="M-15,10 Q-18,-15 0,-20 Q18,-15 15,10 Z" fill="#1E1B4B" />
    <path d="M-15,10 L-10,15 L10,15 L15,10" fill="#1E1B4B" />
    <ellipse cx="0" cy="-20" rx="5" ry="2" fill="#C4B5FD" opacity="0.5" />
    <path d="M0,15 L0,25" />
    <ellipse cx="0" cy="28" rx="12" ry="3" />
    <path d="M-8,-10 Q0,-5 8,-10" stroke="#FCA5A5" stroke-width="0.8" opacity="0.6" />
  </g>

  <!-- Number -->
  <text x="150" y="95" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#FFD580" filter="url(#softglow)" opacity="0.8">1</text>

  <!-- Card Name -->
  <text x="150" y="380" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="17" fill="#FFD580" filter="url(#softglow)" letter-spacing="1.5">Ace of Cups</text>

  <!-- Subtle decorative line under name -->
  <line x1="80" y1="390" x2="220" y2="390" stroke="#FFD580" stroke-width="0.5" opacity="0.3" />

  <!-- Small stars scattered -->
  <circle cx="60" cy="140" r="1" fill="#C4B5FD" opacity="0.4" />
  <circle cx="240" cy="180" r="1.2" fill="#FFD580" opacity="0.3" />
  <circle cx="80" cy="300" r="0.8" fill="#FCA5A5" opacity="0.3" />
  <circle cx="220" cy="120" r="1" fill="#FFD580" opacity="0.35" />
  <circle cx="100" cy="350" r="0.7" fill="#C4B5FD" opacity="0.25" />
  <circle cx="200" cy="340" r="0.9" fill="#FFD580" opacity="0.3" />
</svg>